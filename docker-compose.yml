services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: daftar
      POSTGRES_PASSWORD: daftar
      POSTGRES_DB: daftar
    ports:
      - "5432:5432"
    volumes:
      - daftar_pg:/var/lib/postgresql/data
  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://daftar:daftar@db:5432/daftar
      PGSSL: "false"
      JWT_SECRET: change-me-to-a-long-random-string
      GOOGLE_CLIENT_ID: ""
      PORT: "4000"
    ports:
      - "4000:4000"
volumes:
  daftar_pg:
